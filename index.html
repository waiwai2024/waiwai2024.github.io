    /* 文字框：层级调高到 10 */
    .card-container {
        position: relative;
        z-index: 10;
        background-color: rgba(252, 248, 243, 0.96);
        padding: 40px 60px;
        border-radius: 12px;
        border: 1px solid rgba(118, 98, 137, 0.15);
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        max-width: 600px;
        margin: 20px;
    }

    /* Danny 素描：层级降低到 5，放在框后面 */
    .bg-sketch {
        position: absolute;
        top: -200px;  /* 向上露出一半 */
        left: -150px;  /* 向左露出一半 */
        width: 260px; 
        z-index: 5;   /* 小于容器的 10，确保文字不被遮挡 */
        opacity: 0.6; /* 增加透明度，显得更素雅 */
        pointer-events: none;
    }

    /* watermark：层级降低到 5，放在框后面 */
    .bg-vinyl {
        position: absolute;
        bottom: -80px; /* 向下露出 */
        right: -70px;  /* 向右露出 */
        width: 200px; 
        z-index: 5;    /* 小于容器的 10 */
        opacity: 0.3;
        pointer-events: none;
    }

    h1 {
        font-family: "Source Serif Pro", "Noto Serif CJK SC", serif;
        font-size: 32px;
        margin-bottom: 20px;
        color: #333;
    }

    .domain { font-family: sans-serif; font-weight: 400; font-size: 26px; color: #555; margin-left: 10px; }
    ul { list-style-type: disc; padding-left: 20px; }
    li { font-size: 16px; color: #555; margin-bottom: 12px; line-height: 1.6; }

    a.redirect-link {
        color: #3d8f5c;
        text-decoration: none;
        font-weight: bold;
        border-bottom: 2px solid #3d8f5c;
        padding-bottom: 2px;
        transition: 0.3s;
    }
    a.redirect-link:hover { color: #766289; border-bottom-color: #766289; }
